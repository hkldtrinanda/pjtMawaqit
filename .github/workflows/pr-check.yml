# ─────────────────────────────────────────────────────────────────────────────
# Mawaqit — PR Check (lightweight, cepat)
# Jalan setiap ada Pull Request — hanya test, tidak build
# ─────────────────────────────────────────────────────────────────────────────
name: 🔍 PR Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: ✅ Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Test-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: Library-Test-

      - name: Run Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion:  2022.3.20f1
          testMode:      editMode     # EditMode saja untuk PR (lebih cepat)
          githubToken:   ${{ secrets.GITHUB_TOKEN }}
          checkName:     PR Test Results
